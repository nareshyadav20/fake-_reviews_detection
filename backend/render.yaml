services:
  - type: web
    name: fake-review-detector-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && pip install -r requirements.txt
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: ML_PORT
        value: 6000
