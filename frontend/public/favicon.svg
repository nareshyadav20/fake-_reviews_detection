<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Star shape (slightly muted, behind the glass) -->
  <polygon points="32,8 35.5,22 49,22 38.5,30 42,44 32,36 22,44 25.5,30 15,22 28.5,22" 
           fill="#f6c90e" opacity="0.85"/>

  <!-- Red cross/X over the star -->
  <line x1="18" y1="12" x2="46" y2="46" stroke="#e74c3c" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="46" y1="12" x2="18" y2="46" stroke="#e74c3c" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Magnifying glass circle -->
  <circle cx="27" cy="27" r="13" fill="none" stroke="url(#glassGrad)" stroke-width="4"/>
  <!-- Magnifying glass handle -->
  <line x1="37" y1="37" x2="53" y2="53" stroke="url(#glassGrad)" stroke-width="4.5" stroke-linecap="round"/>
</svg>
